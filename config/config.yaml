instrument:
  index_symbol: "SENSEX"
  exchange: "BSE"
  lot_size: 20  # PLACEHOLDER — set to the real SENSEX weekly options lot size before live use

execution:
  mode: "paper"         # "paper" or "live" — live also requires the --live CLI flag AND confirm_live below
  confirm_live: false   # extra explicit opt-in required before live.run_live will place a single real order

timeframes:
  primary: "minute"
  higher: "5minute"

indicators:
  supertrend_fast:
    length: 10
    multiplier: 1
  supertrend_slow:
    length: 10
    multiplier: 3
  ema_fast_length: 9
  ema_slow_length: 15
  ema_slope_lookback: 5       # bars over which slope is measured (5 bars = 5 min on 1m chart)
  ema_slope_threshold: 3.0   # min points/bar for both EMAs to be considered "steeply angled"
                              # ~5 pts/bar on SENSEX 1-min ≈ 25° visual angle on a standard chart
                              # raise to filter more aggressively, lower to catch weaker trends
  rsi_length: 14
  rsi_midline: 50
  rsi_overbought: 80
  rsi_oversold: 20
  adx_length: 14
  adx_threshold: 25
  atr_length: 14
  atr_sma_length: 14
  volume_lookback: 20
  volume_multiplier: 1.5

risk:
  # risk_pct: 1.0
  risk_pct: 10.0
  reward_risk_ratio: 1.5
  atr_stop_multiplier: 1.2
  breakeven_r: 0.8
  trail_start_r: 1.0
  max_trades_per_day: 5
  max_consecutive_losses: 3
  # max_daily_loss_pct: 2.0
  max_daily_loss_pct: 35.0

trading_hours:
  windows:
    - ["09:25", "12:00"]
    - ["13:00", "15:05"]
  square_off_time: "15:20"

backtest:
  initial_capital: 10000
  warmup_bars: 60
